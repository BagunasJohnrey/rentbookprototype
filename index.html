<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#991b1b" />
    <title>RenTech</title>

    <style>
      /* Splash Screen Overlay */
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #991b1b;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        
        /* 1. Waits 4.5 seconds, then fades out smoothly over 0.5 seconds */
        animation: fadeOutSplash 0.5s ease-in-out 4.5s forwards;
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        /* 2. Logo pulses and floats continuously while splash screen is active */
        animation: pulseAndFloat 2s ease-in-out infinite;
      }

      .splash-text {
        margin-top: 24px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
        /* 3. Text fades in nicely when opened */
        animation: fadeInText 1.5s ease-out forwards;
      }

      /* --- Keyframes for Animations --- */
      @keyframes pulseAndFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-15px) scale(1.05); }
      }

      @keyframes fadeInText {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeOutSplash {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <div id="splash-screen">
      <img src="/icon-192x192.png" alt="RentBook Logo" class="splash-logo" onerror="this.style.display='none'" />
      <div class="splash-text">RentBook</div>
    </div>

    <script>
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.remove();
        }
      }, 5000); // 5000 milliseconds = 5 seconds
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
