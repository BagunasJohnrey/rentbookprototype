<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#991b1b" />
    
    <title>RentBook</title>

    <style>
      /* Splash Screen Animation (Runs instantly before React loads) */
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #991b1b; /* Matches your professional red */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        /* Custom pulsing and floating animation */
        animation: pulseAndFloat 2s ease-in-out infinite;
      }
      .splash-text {
        margin-top: 24px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
        animation: fadeIn 1s ease-out;
      }
      @keyframes pulseAndFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-15px) scale(1.05); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash-screen">
        <img src="/icon-192x192.png" alt="RentBook Logo" class="splash-logo" onerror="this.style.display='none'" />
        <div class="splash-text">RentBook</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
